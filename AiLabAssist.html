<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <title>AI 互動實驗室</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .main-container { display: flex; height: 100vh; width: 100vw; position: relative; background: #f8f9fa; }
    #simIframe { flex: 1; height: 100%; border: none; display: block; }

    #loginOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(18, 29, 51, 0.75); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-box { background: #fff; padding: 30px 40px; border-radius: 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 100%; max-width: 360px; }
    .login-box h2 { margin: 0 0 16px; color: #1f2a44; font-size: 1.4rem; }
    .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; text-align: left;}
    .input-group label { font-size: 0.9rem; font-weight: bold; color: #5f6f8c; margin-bottom: -6px;}
    .login-box input, .login-box select { width: 100%; padding: 12px 15px; border: 2px solid #c9d6ea; border-radius: 12px; font-size: 1.05rem; box-sizing: border-box; outline: none; transition: 0.2s; background: #fff; }
    .login-box input { text-align: center; }
    .login-box input:focus, .login-box select:focus { border-color: #2d6cdf; }
    .login-box select { cursor: pointer; color: #1f2a44; font-weight: bold;}
    .login-box button { background: #2d6cdf; color: white; border: none; padding: 14px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; transition: background 0.2s, transform 0.1s; }
    .login-box button:hover { background: #1749a5; }
    .login-box button:active { transform: scale(0.98); }
    .login-box button:disabled { background: #c9d6ea; cursor: not-allowed; }
    .footer-note { margin-top: 25px; font-size: 0.8rem; color: #888; line-height: 1.5; text-align: center;}
    .hint-text { font-size: 0.85rem; color: #d9485f; margin-top: -6px; text-align: left; }
    .hidden { display: none !important; }

    .chat-container { position: fixed; bottom: 20px; right: 20px; width: 360px; height: 600px; min-width: 280px; min-height: 250px; background: #ffffff; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; z-index: 1000; overflow: hidden; border: 1px solid #e0e0e0; resize: both; }
    .chat-container.docked { position: relative !important; width: 20% !important; min-width: 320px !important; max-width: 500px !important; height: 100% !important; bottom: auto !important; right: auto !important; left: auto !important; top: auto !important; border-radius: 0; resize: none; border-left: 1px solid #d8e2f1; box-shadow: none; }
    .chat-container.minimized { height: 50px !important; min-height: 50px; resize: none; }
    .chat-header { background: #f8f9fa; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; cursor: grab; border-bottom: 1px solid #eee; height: 50px; box-sizing: border-box; user-select: none; }
    .chat-container.docked .chat-header { cursor: default; }
    .chat-header:active { cursor: grabbing; }
    .chat-container.docked .chat-header:active { cursor: default; }
    .header-left { display: flex; align-items: center; gap: 6px; }
    .role-select { padding: 4px 8px; border-radius: 20px; border: 1px solid #ccc; font-size: 13px; outline: none; cursor: pointer; background: white; max-width: 90px;}
    .ai-status-text { font-size: 12px; color: #888; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px;}
    .icon-btn { cursor: pointer; font-size: 13px; font-weight: bold; color: #555; padding: 4px 6px; border-radius: 6px; transition: background 0.2s; white-space: nowrap;}
    .icon-btn:hover { background: #e2e8f0; }
    .chat-body { flex: 1; overflow-y: auto; padding: 15px; background: #f4f7f6; display: flex; flex-direction: column; gap: 12px; }
    .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; word-wrap: break-word; line-height: 1.4; font-size: 14px; }
    .msg-ai { background: #ffffff; border: 1px solid #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .msg-action { background: transparent; border: none; align-self: center; box-shadow: none; color: #777; font-style: italic; font-size: 13px; padding: 4px 8px;}
    .msg-user { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .sys-msg { text-align: center; color: #888; font-size: 12px; margin: 10px 0; }
    .sys-error { text-align: center; color: #d9485f; font-size: 13px; font-weight: bold; margin: 10px 0; background: #fef6f7; padding: 8px; border-radius: 8px;}
    .chat-input-area { padding: 10px 15px; border-top: 1px solid #eee; background: #fff; display: flex; gap: 8px; box-sizing: border-box; height: 60px; }
    .chat-input-area input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 14px; }
    .chat-input-area button { padding: 8px 16px; background: #4285F4; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
    .chat-input-area button:hover { background: #3367d6; }
  </style>
</head>
<body>

  <div id="loginOverlay">
    <div class="login-box">
      <h2>進入 AI 互動實驗室</h2>
      <div class="input-group" id="stepExpSelect">
        <label for="expSelect">1. 選擇實驗單元</label>
        <select id="expSelect" onchange="updateExpPreview()"><option>系統準備中...</option></select>
      </div>
      <div class="input-group" id="step1">
        <label for="accountInput">2. 登入身分</label>
        <input type="text" id="accountInput" placeholder="輸入帳號或姓名" onkeypress="if(event.key === 'Enter') verifyAccount()">
        <button onclick="verifyAccount()" id="verifyBtn" disabled>系統準備中...</button>
      </div>
      <div class="input-group hidden" id="stepPassword">
        <p class="hint-text">請輸入該帳號的密碼：</p>
        <input type="password" id="passwordInput" placeholder="請輸入密碼" onkeypress="if(event.key === 'Enter') checkPassword()">
        <button onclick="checkPassword()" id="passBtn">驗證登入</button>
      </div>
      <div class="input-group hidden" id="stepCustomKey">
        <p class="hint-text">此名稱不在白名單內。<br>請輸入您的 API Key 以繼續：</p>
        <input type="password" id="apiKeyInput" placeholder="AIzaSy..." onkeypress="if(event.key === 'Enter') startCustomLab()">
        <button onclick="startCustomLab()" id="customBtn">開始實驗</button>
      </div>
    </div>
  </div>

  <div class="main-container">
    <iframe id="simIframe"></iframe>
    <div class="chat-container docked" id="chatContainer">
      <div class="chat-header" id="chatHeader">
        <div class="header-left">
          <span class="icon-btn" id="visionBtn" onclick="requestScreenShare()" title="授權 AI 觀看實驗" style="color: #d9485f;">👁️ 點我授權</span>
          <img id="aiAvatar" src="" alt="AI" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover;">
          <select class="role-select" id="roleSelect" onmousedown="event.stopPropagation();" onchange="switchRole()"></select>
          <span class="ai-status-text" id="aiStatusText">(等待操作...)</span>
        </div>
        <div style="display: flex; gap: 4px; align-items: center;">
          <span class="icon-btn" onclick="downloadHistory()" title="下載歷程">💾</span>
          <span class="icon-btn" id="dockIcon" onclick="toggleDock(event)" title="切換停靠">📌</span>
          <span class="icon-btn" id="toggleIcon" onclick="toggleChat(event)">▼</span>
        </div>
      </div>
      <div class="chat-body" id="chatBox"></div>
      <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="輸入你想問的..." onkeypress="if(event.key === 'Enter') sendMessage()" disabled>
        <button onclick="sendMessage()" id="sendBtn" disabled>發送</button>
      </div>
    </div>
  </div>
  <video id="screenVideo" autoplay muted playsinline style="position: fixed; bottom: 0; right: 0; width: 2px; height: 2px; opacity: 0.01; pointer-events: none; z-index: -1;"></video>
<canvas id="diffCanvas" style="display:none;"></canvas>
<canvas id="captureCanvas" style="display:none;"></canvas>
  
  <script>
    let currentSimState = {};
    let debounceTimer = null; 
    let isWaitingForAI = false; 
    let isFirstLoad = true; 
    let actionLog = []; 
    const MAX_LOG_SIZE = 15;
    let allExperimentsList = [];
    let characterList = []; 
    let recentChatHistory = [];

    let currentIgnoreRate = 0.3;
    let currentReactionTime = 3000;
    let currentStudyActions = ["看著你"];
    let currentIdleActions = ["發呆中"];
    let currentConcernLines = ["你還在嗎？"];
    let currentSleepActions = ["睡著了"];
    let currentWakeActions = ["醒來了"];
    let isThrottled = false; 

    let lastActivityTime = Date.now();
    let idleState = 0; 
    let idleCheckInterval = null;
    let statusChangeInterval = null;
    let hasUserActed = false;       
    let isFirstAIResponse = true;   

    let currentCredentials = { account: '', type: '', customKey: '', limit: 0 };
    let currentExpName = "";
    let sessionRowIndex = -1;  
    let fullSessionHistory = []; 
    let syncTimer = null;        
    
    let systemGreetingMsg = "";
    let waitForGreeting = false;

    const chatContainer = document.getElementById('chatContainer');
    const chatHeader = document.getElementById('chatHeader');
    const toggleIcon = document.getElementById('toggleIcon');
    const dockIcon = document.getElementById('dockIcon');
    const loginOverlay = document.getElementById('loginOverlay');

// ==========================================
    // 🌟 外部 API 通訊橋樑 (取代舊版的 google.script.run)
    // ==========================================
    const gasUrl = "https://script.google.com/macros/s/AKfycbzNDnn82bxLWvEZdnkI83mvG-spC6yTPO5vLM6My8PxZh6uwrKNiV_XFbMKyejNzE8J/exec";

async function callGasApi(action, payload = {}) {
      try {
        const response = await fetch(gasUrl, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ action: action, ...payload })
        });
        
        // ==========================================
        // 🌟 防呆升級：先不要急著轉 JSON，先把包裹拆開看內容
        // ==========================================
        const rawText = await response.text(); 
        
        try {
          // 嘗試把收到的文字轉換成 JSON 格式
          return JSON.parse(rawText); 
        } catch (parseError) {
          // 如果轉換失敗，代表 GAS 傳回了 HTML 網頁或純文字錯誤
          console.error("❌ 後端回傳的不是 JSON 格式！收到的原始內容為：\n", rawText);
          throw new Error(`後端回應異常(可能是 Google 帳號衝突)。\n原始內容: ${rawText.substring(0, 60)}...`);
        }

      } catch (error) {
        console.error("API 呼叫發生錯誤:", error);
        throw error;
      }
    }

    // 擷取並壓縮當下畫面 (用於傳送給後端)
    function captureHighResScreenshot() {
      const video = document.getElementById('screenVideo');
      const canvas = document.getElementById('captureCanvas');
      
      // 🌟 防呆：如果影片寬高是 0 (還沒載入或被休眠)，直接回傳空字串避免破圖
      if (!video.videoWidth || video.videoWidth === 0) {
        console.log("視訊尚未準備好或被瀏覽器休眠");
        return "";
      }
      
      canvas.width = 800;
      canvas.height = (video.videoHeight / video.videoWidth) * 800;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      let dataUrl = canvas.toDataURL('image/jpeg', 0.6);
      latestScreenshotBase64 = dataUrl.split(',')[1]; 
      return latestScreenshotBase64;
    }

    // 🌟 初始化：向新的 GAS 網址請求資料
    callGasApi('getWebAppInitData')
      .then(data => initializePage(data))
      .catch(err => {
        alert("⚠️ 系統載入失敗！錯誤訊息：" + err.message + "\n請檢查 API 網址或網路連線。");
        document.getElementById('verifyBtn').innerText = "系統錯誤";
      });

    function initializePage(data) {
      const verifyBtn = document.getElementById('verifyBtn');
      const expSelect = document.getElementById('expSelect');
      allExperimentsList = data.experiments || [];
      characterList = data.characters || [];

      if (allExperimentsList.length > 0) {
        expSelect.innerHTML = '';
        allExperimentsList.forEach(exp => {
          let opt = document.createElement('option');
          opt.value = exp.id; 
          opt.text = exp.name;
          if (exp.id === data.defaultExpId) opt.selected = true;
          expSelect.appendChild(opt);
        });
        const selectedExp = allExperimentsList.find(e => e.id === expSelect.value);
        if (selectedExp) {
            currentExpName = selectedExp.name;
            const roleSelect = document.getElementById('roleSelect');
            roleSelect.innerHTML = ''; 
            let filteredChars = characterList.filter(c => selectedExp.allowedRoles && selectedExp.allowedRoles.includes(c.id));
            if (filteredChars.length === 0) filteredChars = characterList; 
            filteredChars.forEach(char => {
              let opt = document.createElement('option');
              opt.value = char.id; 
              opt.text = char.name; 
              roleSelect.appendChild(opt);
            });
            switchRole(true);
        }

        verifyBtn.innerText = "驗證身分並進入";
        verifyBtn.style.background = "#2d6cdf";
        verifyBtn.disabled = false;
        document.getElementById('accountInput').focus();
      } else {
        expSelect.innerHTML = '<option>❌ 系統找不到實驗教材</option>';
      }
    }

    function updateExpPreview() {
      const expSelect = document.getElementById('expSelect');
      const selectedExp = allExperimentsList.find(e => e.id === expSelect.value);
      if (!selectedExp) return;

      currentExpName = selectedExp.name; 
      const roleSelect = document.getElementById('roleSelect');
      roleSelect.innerHTML = ''; 

      let filteredChars = characterList;
      if (selectedExp.allowedRoles && selectedExp.allowedRoles.length > 0) {
        filteredChars = characterList.filter(c => selectedExp.allowedRoles.includes(c.id));
      }
      if (filteredChars.length === 0) filteredChars = characterList;
      filteredChars.forEach(char => {
        let opt = document.createElement('option');
        opt.value = char.id; 
        opt.text = char.name; 
        roleSelect.appendChild(opt);
      });
      switchRole(true);
    }

    function verifyAccount() { 
      let acc = document.getElementById('accountInput').value.trim();
      if (!acc) return;
      document.getElementById('verifyBtn').disabled = true;
      
      callGasApi('checkAccountStatus', { accountName: acc })
        .then((res) => {
          currentCredentials.account = acc; currentCredentials.type = res.type; currentCredentials.limit = res.limit;
          document.getElementById('step1').classList.add('hidden');
          if (res.type === 'system') { res.reqPass ? document.getElementById('stepPassword').classList.remove('hidden') : executeLogin(); }
          else { document.getElementById('stepCustomKey').classList.remove('hidden'); }
        });
    }

    function checkPassword() { 
      let pass = document.getElementById('passwordInput').value.trim();
      callGasApi('verifyPassword', { accountName: currentCredentials.account, inputPassword: pass })
        .then((isValid) => { isValid ? executeLogin() : alert("密碼錯誤"); });
    }

    function startCustomLab() { let key = document.getElementById('apiKeyInput').value.trim(); if (!key) return; currentCredentials.customKey = key; executeLogin(); }

function executeLogin() {
      // 1. 隱藏登入遮罩並啟用聊天輸入介面
      loginOverlay.style.display = 'none'; 
      document.getElementById('userInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;

      // 2. 根據下拉選單找出目前選擇的實驗資料
      const selectedExp = allExperimentsList.find(e => e.id === document.getElementById('expSelect').value);
      
      if (selectedExp) {
        // 3. 載入 PhET 實驗網址到中間的 iframe
        document.getElementById('simIframe').src = selectedExp.url;
        
        // 4. 🧠 注入背景知識：將從 Google Sheet 讀到的「說明書」放入 AI 的記憶中
        currentSimState["【系統隱藏資訊：本實驗的背景知識與規則】"] = selectedExp.aiManual;

        // 5. 👁️ 重置視覺授權按鈕狀態
        // 這是為了預防學生從「有廣播的實驗」切換到「沒廣播的實驗」時按鈕消失的問題
        const vBtn = document.getElementById('visionBtn');
        vBtn.style.display = 'inline-block'; // 確保按鈕顯示
        vBtn.innerText = "👁️ 點我授權";
        vBtn.style.color = "#d9485f";        // 恢復為紅色提醒
        vBtn.style.pointerEvents = "auto";   // 恢復可點擊

        // 如果原本已經有開啟的視訊串流，先徹底關閉以節省效能與電力
        if (typeof screenStream !== 'undefined' && screenStream) {
          screenStream.getTracks().forEach(track => track.stop());
          screenStream = null;
        }
      }

      // 6. 📝 向 GAS 後台回報學生登入，並啟動學習歷程紀錄
      // 注意：這裡改用 callGasApi 以符合 GitHub 跨網域架構
      callGasApi('startLogSession', { 
        studentName: currentCredentials.account, 
        expName: currentExpName 
      })
      .then((row) => {
        // 儲存這一筆紀錄在 Google Sheet 中的行號，方便後續更新
        sessionRowIndex = row;
        appendLogHistory(`【系統】帳號「${currentCredentials.account}」登入並開始實驗。`);

        // 7. 🤖 處理 AI 開場白 (Greeting Message)
        if (isFirstLoad) {
          isFirstLoad = false; 
          // 如果實驗程式已經有廣播開場白過來，就直接顯示
          if (systemGreetingMsg !== "") {
            printDirectGreeting(systemGreetingMsg);
          } else {
            // 如果 5 秒內實驗室沒說話，則顯示系統預設的招呼語
            waitForGreeting = true; 
            setTimeout(() => { 
              if (waitForGreeting && systemGreetingMsg === "") {
                waitForGreeting = false;
                printDirectGreeting("【系統提示】已進入實驗室，請開始操作儀器。");
              }
            }, 5000); 
          }
        }
      })
      .catch(err => {
        console.error("無法連線至 GAS 啟動紀錄:", err);
      });
    }

    function printDirectGreeting(msg) {
      var chatBox = document.getElementById('chatBox');
      const roleName = document.getElementById('roleSelect').options[document.getElementById('roleSelect').selectedIndex].text;
      chatBox.innerHTML += `<div class="msg msg-ai">${msg}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      appendLogHistory(`【系統開場白】${msg}`);
      recentChatHistory.push(`【${roleName}】${msg}`);
    }

    function startIdleSystem() {
      if (idleCheckInterval) return;

      lastActivityTime = Date.now();
      idleCheckInterval = setInterval(() => {
        if (!currentCredentials.account || isWaitingForAI) return;
        const diff = Date.now() - lastActivityTime;
        const chatBox = document.getElementById('chatBox');
        const roleName = document.getElementById('roleSelect').options[document.getElementById('roleSelect').selectedIndex].text;

        if (diff > 300000 && idleState === 2) { 
          idleState = 3;
          let sleepAction = getRandomAction(currentSleepActions, "睡著了");
          document.getElementById('aiStatusText').innerText = `(${sleepAction})`;
          document.getElementById('aiAvatar').style.filter = "grayscale(50%) blur(1px)";
          let msg = `*(${roleName} ${sleepAction})*`;
          chatBox.innerHTML += `<div class="msg msg-action">${msg}</div>`;
          chatBox.scrollTop = chatBox.scrollHeight;
          appendLogHistory(`【AI 狀態】${msg}`);
        } 
        else if (diff > 180000 && idleState === 1) { 
          idleState = 2;
          let msg = getRandomAction(currentConcernLines, "欸，你怎麼停下來了？是不是哪裡卡住了？");
          chatBox.innerHTML += `<div class="msg msg-ai">${msg}</div>`;
          chatBox.scrollTop = chatBox.scrollHeight;
          appendLogHistory(`【AI ${roleName}關心】${msg}`);
        }
        else if (diff > 120000 && idleState === 0) { 
          idleState = 1;
          let action = getRandomAction(currentIdleActions, "發呆中");
          document.getElementById('aiStatusText').innerText = `(${action})`;
          let msg = `*(${roleName} ${action})*`;
          chatBox.innerHTML += `<div class="msg msg-action">${msg}</div>`;
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }, 1000);

      statusChangeInterval = setInterval(() => {
        if (idleState === 0) {
          let action = getRandomAction(currentStudyActions, "認真看著你");
          document.getElementById('aiStatusText').innerText = `(${action})`;
        }
      }, 30000);
    }

    function resetIdleTimer() {
      if (!hasUserActed) return;
      if (idleState === 3) { 
        const roleName = document.getElementById('roleSelect').options[document.getElementById('roleSelect').selectedIndex].text;
        const chatBox = document.getElementById('chatBox');
        let wakeAction = getRandomAction(currentWakeActions, "突然驚醒");
        chatBox.innerHTML += `<div class="msg msg-action">*(${roleName} ${wakeAction})*</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        document.getElementById('aiAvatar').style.filter = "none";
      }
      
      lastActivityTime = Date.now();
      idleState = 0;
      let action = getRandomAction(currentStudyActions, "認真看著你");
      document.getElementById('aiStatusText').innerText = `(${action})`;
    }

    function getRandomAction(arr, defaultText) {
      if (!arr || arr.length === 0) return defaultText;
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function buildActionLogLine(payload, actionText) {
      if (!payload) return `動作：${actionText}`;
      if (typeof payload["log摘要"] === "string" && payload["log摘要"]) { return `動作：${actionText} (${payload["log摘要"]})`; }
      if (typeof payload.logSummary === "string" && payload.logSummary) { return `動作：${actionText} (${payload.logSummary})`; }

      const excludeKeys = new Set([
        "學生最後的動作", "目前介面階段", "action", "liquid", "depth", "reading", "動作", "液體", "當下液體", "深度", "讀數", "壓力", "當前選擇角色", "近期對話脈絡", "過去一段時間的操作 Log", "給AI夥伴的評估提示", "給AI老師的提示", "訊息類型", "log摘要", "logSummary"
      ]);
      let parts = [];
      for (let key in payload) {
        if (!Object.prototype.hasOwnProperty.call(payload, key)) continue;
        if (excludeKeys.has(key)) continue;
        if (key.startsWith("_")) continue;
        let val = payload[key];
        if (val === undefined || val === null || typeof val === "object") continue;
        let valStr = String(val).trim();
        if (!valStr || valStr.length > 60) continue;
        parts.push(`${key}：${valStr}`);
        if (parts.length >= 5) break;
      }
      if (parts.length === 0) return `動作：${actionText}`;
      return `動作：${actionText} (${parts.join('；')})`;
    }

    function downloadHistory() { 
      if (fullSessionHistory.length===0) return;
      const text = fullSessionHistory.join('\n');
      const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([text], {type:'text/plain'})); a.download = `log.txt`; a.click();
    }
    
    function appendLogHistory(entryText) {
      let t = new Date().toLocaleTimeString('zh-TW', {hour12: false});
      fullSessionHistory.push(`[${t}] ${entryText}`);
      if (sessionRowIndex === -1) return;
      clearTimeout(syncTimer); 
      syncTimer = setTimeout(() => { callGasApi('updateLogSession', { rowIndex: sessionRowIndex, fullLogStr: fullSessionHistory.join('\n') }); }, 2000);
    }

    function toggleDock(e) {  
      if(e) e.stopPropagation(); chatContainer.classList.toggle('docked');
      if (!chatContainer.classList.contains('docked')) { chatContainer.style.cssText = 'position: fixed; bottom: 20px; right: 20px; width: 360px; height: 600px;'; dockIcon.style.opacity = '0.5';
      } else { chatContainer.style.cssText = ''; dockIcon.style.opacity = '1'; }
    }
    
    function toggleChat(e) { if(e) e.stopPropagation(); chatContainer.classList.toggle('minimized'); toggleIcon.innerText = chatContainer.classList.contains('minimized') ? '▲' : '▼'; }

    let isDragging = false;
    let dragStartX, dragStartY, initialLeft, initialTop;
    chatHeader.addEventListener('mousedown', (e) => { 
      if (chatContainer.classList.contains('docked')) return; 
      if (e.target.tagName.toLowerCase() === 'select' || e.target.tagName.toLowerCase() === 'option' || e.target.classList.contains('icon-btn')) return; 
      isDragging = true; 
      dragStartX = e.clientX; dragStartY = e.clientY; 
      const rect = chatContainer.getBoundingClientRect(); 
      chatContainer.style.bottom = 'auto'; chatContainer.style.right = 'auto'; 
      chatContainer.style.left = rect.left + 'px'; chatContainer.style.top = rect.top + 'px'; 
      initialLeft = rect.left; initialTop = rect.top; 
      document.getElementById('simIframe').style.pointerEvents = 'none';
    });
    
    document.addEventListener('mousemove', (e) => { 
      if (!isDragging) return; 
      chatContainer.style.left = (initialLeft + (e.clientX - dragStartX)) + 'px'; 
      chatContainer.style.top = (initialTop + (e.clientY - dragStartY)) + 'px'; 
    });
    
    document.addEventListener('mouseup', () => { 
      isDragging = false; 
      document.getElementById('simIframe').style.pointerEvents = 'auto';
    });

    function switchRole(isInit = false) {
      const roleSelect = document.getElementById('roleSelect');
      if (roleSelect.options.length === 0) return;
      const selectedId = roleSelect.value;
      const roleName = roleSelect.options[roleSelect.selectedIndex].text;
      const selectedChar = characterList.find(c => c.id === selectedId);
      if (selectedChar) { 
        if(selectedChar.avatar) document.getElementById('aiAvatar').src = selectedChar.avatar; 
        currentIgnoreRate = selectedChar.ignoreRate;
        currentReactionTime = selectedChar.reactionTime;
        currentStudyActions = selectedChar.studyActions && selectedChar.studyActions.length > 0 ? selectedChar.studyActions : ["看著你"];
        currentIdleActions = selectedChar.idleActions && selectedChar.idleActions.length > 0 ? selectedChar.idleActions : ["發呆中"];
        currentConcernLines = selectedChar.concernLines && selectedChar.concernLines.length > 0 ? selectedChar.concernLines : ["你還在嗎？"];
        currentSleepActions = selectedChar.sleepActions && selectedChar.sleepActions.length > 0 ? selectedChar.sleepActions : ["睡著了"];
        currentWakeActions = selectedChar.wakeActions && selectedChar.wakeActions.length > 0 ? selectedChar.wakeActions : ["醒來了"];
      }

      isThrottled = false;
      if (hasUserActed) { resetIdleTimer(); }

      if (!isInit) {
        var chatBox = document.getElementById('chatBox');
        chatBox.innerHTML += `<div class="sys-msg">-- 已切換對話角色為：${roleName} --</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        appendLogHistory(`【系統】切換對話角色為：${roleName}`);
      }
      recentChatHistory = [];
      currentSimState["當前選擇角色"] = selectedId;
    }

    function processAIResult(response, thinkingId) {
      isWaitingForAI = false;
      const thinkingEl = document.getElementById(thinkingId);
      if (thinkingEl) thinkingEl.remove();
      
      var chatBox = document.getElementById('chatBox');
      const roleName = document.getElementById('roleSelect').options[document.getElementById('roleSelect').selectedIndex].text;
      if (response.includes("系統提示：") || response.includes("發生錯誤") || response.includes("超出頻寬配額")) {
        isThrottled = true;
        chatBox.innerHTML += `<div class="sys-error">${response}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        return; 
      }

      if (response === "FALLBACK") {
        isThrottled = true;
        let fallbackAction = getRandomAction(currentStudyActions, "思考了一下");
        let fallbackBubble = `*(${roleName} ${fallbackAction})*`;
        chatBox.innerHTML += `<div class="msg msg-action">${fallbackBubble}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
        appendLogHistory(`【AI ${roleName}動作】${fallbackBubble}`);
        return; 
      }

      var formattedResponse = response.replace(/\n/g, '<br>');
      chatBox.innerHTML += `<div class="msg msg-ai">${formattedResponse}</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      appendLogHistory(`【AI ${roleName}回答】${response}`);
      
      recentChatHistory.push(`【${roleName}】${response}`);
      if (recentChatHistory.length > 8) recentChatHistory.shift();
    }

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === 'SIMULATION_STATE') {
        // ==========================================
        // 🌟 自動偵測：收到廣播，隱藏授權按鈕並關閉視覺引擎
        // ==========================================
        const vBtn = document.getElementById('visionBtn');
        if (vBtn.style.display !== 'none') {
          vBtn.style.display = 'none'; // 把按鈕藏起來
          console.log("偵測到實驗室原生廣播，自動關閉視覺截圖功能！");
          
          // 如果學生手太快已經按了授權，幫他把視訊串流關掉省資源
          if (typeof screenStream !== 'undefined' && screenStream) {
            screenStream.getTracks().forEach(track => track.stop());
            screenStream = null;
          }
        }
        let payloadAction = event.data.payload["學生最後的動作"] || "";
        
        if (payloadAction.indexOf("【系統開場白】") !== -1) {
          let msg = payloadAction.replace("【系統開場白】", "").trim();
          systemGreetingMsg = msg; 
          if (waitForGreeting) {
            waitForGreeting = false;
            printDirectGreeting(msg);
          }
          return; 
        }
        if (!currentCredentials.account) return; 

        if (payloadAction.indexOf("學生正式送出實驗報告") !== -1) {
          handleStudentReport(event.data.payload, payloadAction);
          return; 
        }
  
        if (payloadAction === "觀察實驗室環境中" || payloadAction === "") return; 

        if (!hasUserActed) {
          hasUserActed = true;
          startIdleSystem(); 
        }

        resetIdleTimer();

        currentSimState = event.data.payload;
        currentSimState["當前選擇角色"] = document.getElementById('roleSelect') ? document.getElementById('roleSelect').value : "";
        currentSimState["近期對話脈絡"] = recentChatHistory;
        let timeString = new Date().toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        let actionStr = buildActionLogLine(event.data.payload, payloadAction);
        
        actionLog.push(`[${timeString}] ${actionStr}`);
        if (actionLog.length > MAX_LOG_SIZE) actionLog.shift(); 
        currentSimState["過去一段時間的操作 Log"] = actionLog;

        appendLogHistory(`【操作】${actionStr}`);

        clearTimeout(debounceTimer);
        let actualIgnoreRate = isThrottled ? Math.max(currentIgnoreRate, 0.7) : currentIgnoreRate;
        let actualReactionTime = isThrottled ? currentReactionTime + 3000 : currentReactionTime;
        let willIgnore = Math.random() < actualIgnoreRate; 

        debounceTimer = setTimeout(() => {
          if (willIgnore) return;
          if (!isWaitingForAI && idleState === 0) triggerAIAutoResponse(); 
        }, actualReactionTime + Math.floor(Math.random() * 1000));
      }
    });

function triggerAIAutoResponse() {
      isWaitingForAI = true; 
      var chatBox = document.getElementById('chatBox');
      var thinkingId = 'thinking-auto-' + Date.now();
      chatBox.innerHTML += `<div id="${thinkingId}" class="msg msg-action" style="opacity:0.6;">(觀察中...)</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      // ==========================================
      // 🌟 修正：這裡是「操作後的回應」，給它嚴格看圖的指令！
      // ==========================================
var hiddenPrompt = "（系統隱藏事件：使用者剛剛單純用滑鼠操作了畫面並停頓，『並沒有打字說話』。請嚴格基於「最新截圖」的變化給予1句話的引導或提問。⚠️嚴格禁止：如果學生並沒有提出觀察結果或對話，你絕對不能說「你觀察得很仔細」、「你說得對」、「你發現了」等彷彿使用者有發言的台詞。不要腦補不存在的儀器，也不要重新介紹環境。）";
      let useFallbackChance = isThrottled ? 0.6 : 0.05; 
      if (isFirstAIResponse) {
         hiddenPrompt = "（系統隱藏事件：這是你『第一次』開口跟使用者說話，且使用者剛剛做了一個動作。請先熱情地簡短打招呼，接著針對他的動作給予回應。控制在2句話以內，絕對不要重新介紹環境。）";
         useFallbackChance = 0; 
         isFirstAIResponse = false; 
      }

      if (Math.random() < useFallbackChance) { setTimeout(() => { processAIResult("FALLBACK", thinkingId); }, 1500); return; }

      let imgToSend = screenStream ? latestScreenshotBase64 : "";
      callGasApi('chatWithAI', {
        userMessage: hiddenPrompt,
        simStateStr: JSON.stringify(currentSimState),
        credentials: currentCredentials,
        imageBase64: imgToSend
      })
      .then(res => processAIResult(res, thinkingId))
      .catch(err => processAIResult("FALLBACK", thinkingId));
    }

    function handleStudentReport(payload, payloadAction) {
      clearTimeout(debounceTimer);
      if (!hasUserActed) {
        hasUserActed = true;
        startIdleSystem();
      }
      isFirstAIResponse = false;
      if (idleState !== 0) {
        idleState = 0;
        document.getElementById('aiAvatar').style.filter = "none";
      }
      lastActivityTime = Date.now();
      
      currentSimState = payload;
      currentSimState["當前選擇角色"] = document.getElementById('roleSelect').value;
      currentSimState["近期對話脈絡"] = recentChatHistory;
      let timeString = new Date().toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
      actionLog.push(`[${timeString}] 📤 學生正式提交了實驗報告`);
      if (actionLog.length > MAX_LOG_SIZE) actionLog.shift();
      currentSimState["過去一段時間的操作 Log"] = actionLog;
      appendLogHistory(`【📤 學生提交報告】${payloadAction.substring(0, 100)}...`);
      
      var chatBox = document.getElementById('chatBox');
      const roleName = document.getElementById('roleSelect').options[document.getElementById('roleSelect').selectedIndex].text;
      var thinkingId = 'thinking-report-' + Date.now();
      chatBox.innerHTML += `<div id="${thinkingId}" class="msg msg-action" style="opacity:0.8;">📚 (${roleName} 正在仔細閱讀你的實驗報告...)</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      
      var hiddenPrompt = "（系統重要事件：學生剛剛正式送出實驗報告，請仔細閱讀『學生最後的動作』欄位裡學生填寫的觀察與結論全文，給予具體、有結構的回饋。請：①先肯定觀察的優點；②指出需要補充或修正的地方；③提一個延伸思考的問題。長度可達 5-8 句。）";
      
      isWaitingForAI = true;
      let imgToSend = screenStream ? latestScreenshotBase64 : "";
      callGasApi('chatWithAI', {
        userMessage: hiddenPrompt,
        simStateStr: JSON.stringify(currentSimState),
        credentials: currentCredentials,
        imageBase64: imgToSend
      })
      .then(res => processAIResult(res, thinkingId))
      .catch(err => processAIResult("⚠️ 報告送出失敗，請再試一次。", thinkingId));
    }

    function sendMessage() {
      var inputEl = document.getElementById('userInput');
      var text = inputEl.value.trim();
      if (!text) return;
      
      if (!hasUserActed) {
          hasUserActed = true;
          isFirstAIResponse = false; 
          startIdleSystem();
      }
      resetIdleTimer(); 

      var chatBox = document.getElementById('chatBox');
      chatBox.innerHTML += `<div class="msg msg-user">${text}</div>`;
      inputEl.value = ''; chatBox.scrollTop = chatBox.scrollHeight;
      appendLogHistory(`【學生 ${currentCredentials.account}】${text}`);

      recentChatHistory.push(`【學生】${text}`);
      if (recentChatHistory.length > 8) recentChatHistory.shift();
      currentSimState["近期對話脈絡"] = recentChatHistory;

      isWaitingForAI = true;
      var thinkingId = 'thinking-' + Date.now();
      chatBox.innerHTML += `<div id="${thinkingId}" class="msg msg-action" style="opacity:0.6;">(思考中...)</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;
      currentSimState["當前選擇角色"] = document.getElementById('roleSelect').value;
      
      let imgToSend = screenStream ? captureHighResScreenshot() : "";
      callGasApi('chatWithAI', {
        userMessage: text,
        simStateStr: JSON.stringify(currentSimState),
        credentials: currentCredentials,
        imageBase64: imgToSend
      })
      .then(res => processAIResult(res, thinkingId))
      .catch(err => processAIResult("FALLBACK", thinkingId));
    }

    // ==========================================
    // 🌟 AI 視覺與動態偵測引擎
    // ==========================================
    let screenStream = null;
    let diffCtx = null;
    let lastImageData = null;
    let isOperating = false;
    let motionStopTimer = null;
    let latestScreenshotBase64 = "";

    async function requestScreenShare() {
      try {
        if (screenStream) {
          screenStream.getTracks().forEach(track => track.stop());
        }

        screenStream = await navigator.mediaDevices.getDisplayMedia({ 
          video: { displaySurface: "browser" },
          preferCurrentTab: true 
        });
        
        const videoEl = document.getElementById('screenVideo');
        videoEl.srcObject = screenStream;
        videoEl.onloadedmetadata = () => { videoEl.play(); };
        
        const btn = document.getElementById('visionBtn');
        btn.innerText = "👁️ AI 觀察中";
        btn.style.color = "#2e7d32";

        screenStream.getVideoTracks()[0].onended = function () {
          btn.innerText = "👁️ 點我重新授權";
          btn.style.color = "#d9485f";
          isOperating = false;
        };

        const diffCanvas = document.getElementById('diffCanvas');
        diffCanvas.width = 50;
        diffCanvas.height = 50;
        diffCtx = diffCanvas.getContext('2d', { willReadFrequently: true });

        if (window.motionInterval) clearInterval(window.motionInterval);
        window.motionInterval = setInterval(checkVideoMotion, 500);

        // ==========================================
        // 🌟 新增：授權成功後，立刻觸發 AI 的「第一印象」介紹
        // ==========================================
        triggerFirstVisionGreeting();
        // ==========================================

      } catch (e) {
        console.log("授權取消或失敗");
      }
    }

    function triggerFirstVisionGreeting() {
      // 如果 AI 正在思考，或是之前已經打過招呼了，就跳過
      if (isWaitingForAI) return;

      var chatBox = document.getElementById('chatBox');
      var thinkingId = 'thinking-vision-start-' + Date.now();
      
      // 顯示一個提示，讓學生知道 AI 正在看
      const roleName = document.getElementById('roleSelect').options[document.getElementById('roleSelect').selectedIndex].text;
      chatBox.innerHTML += `<div id="${thinkingId}" class="msg msg-action" style="opacity:0.8;">👀 (${roleName} 正在觀察實驗室環境...)</div>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      // 取得說明書內容
      const manual = currentSimState["【系統隱藏資訊：本實驗的背景知識與規則】"] || "這是一個科學實驗。";

      // 🌟 核心指令：要求 AI 讀取說明書並轉化為「第一段對話」
// 🌟 強化版：要求 AI 嚴格確認初始狀態
      var hiddenPrompt = `（系統重要事件：學生已授權視覺功能，你現在看得到畫面了。請嚴格根據你「眼睛」看到的最新截圖，確認物體現在的位置。請參考以下實驗說明書，熱情地向學生打招呼並簡介實驗。切記：不要腦補器材！說明書內容：${manual}）`;
      isWaitingForAI = true;
      
      // 擷取當下畫面送出
      let imgToSend = captureHighResScreenshot();

      callGasApi('chatWithAI', {
        userMessage: hiddenPrompt,
        simStateStr: JSON.stringify(currentSimState),
        credentials: currentCredentials,
        imageBase64: imgToSend
      })
      .then(res => {
        // AI 說完話後，將此視為開場白，後續就不再重複觸發
        isFirstAIResponse = false; 
        processAIResult(res, thinkingId);
      })
      .catch(err => processAIResult("FALLBACK", thinkingId));
    }

    
function checkVideoMotion() {
      // 🌟 防呆 1：AI 思考時暫停偵測
      if (isWaitingForAI) return;

      const video = document.getElementById('screenVideo');
      if (!video || video.readyState !== 4 || video.videoWidth === 0) return;

      // 先將完整的影片畫面，原封不動地畫到 50x50 的比對畫布上
      diffCtx.drawImage(video, 0, 0, 50, 50);

      // ==========================================
      // 🌟 終極防呆 2：動態追蹤遮罩 (Dynamic Masking)
      // ==========================================
      // 算出畫布 (50x50) 與實際瀏覽器視窗大小的縮放比例
      const scaleX = 50 / window.innerWidth;
      const scaleY = 50 / window.innerHeight;

      // 取得聊天視窗「當下」的真實座標與大小 (無論停靠、浮動、縮小都抓得到)
      const chatContainer = document.getElementById('chatContainer');
      const chatRect = chatContainer.getBoundingClientRect();

      // 在比對畫布上，把聊天視窗所在的區域「塗成純黑」
      diffCtx.fillStyle = "black";
      diffCtx.fillRect(
        chatRect.left * scaleX, 
        chatRect.top * scaleY, 
        chatRect.width * scaleX, 
        chatRect.height * scaleY
      );

      // 取得塗黑後的最終像素資料，進行後續比對
      const currentImageData = diffCtx.getImageData(0, 0, 50, 50).data;

      if (lastImageData) {
        let diffCount = 0;
        // 粗略比對像素差異
        for (let i = 0; i < currentImageData.length; i += 4) {
          if (Math.abs(currentImageData[i] - lastImageData[i]) > 20) diffCount++;
        }
if (diffCount > 30) {
          // 畫面劇烈變動：學生正在操作 (此時聊天框的變化已被無視)
          isOperating = true;
          clearTimeout(motionStopTimer); 
          
          // ==========================================
          // 🌟 修正：如果這是學生的「第一次」動作，必須正式啟動發呆系統！
          // ==========================================
          if (!hasUserActed) {
            hasUserActed = true;
            startIdleSystem();
          }
          
          resetIdleTimer();
        }
        else if (isOperating) {
          // 畫面停下來了：操作暫停
          isOperating = false;
          
          motionStopTimer = setTimeout(() => {
            captureHighResScreenshot();
            console.log("操作暫停，已擷取最新畫面！");
            
            // ==========================================
            // 🌟 補回原汁原味的「忽視率 (Ignore Rate)」！
            // 讓 AI 有機率保持安靜，不會每個動作都碎碎念
            // ==========================================
            let willIgnore = Math.random() < currentIgnoreRate;
            
            if (!willIgnore && !isWaitingForAI) {
              triggerAIAutoResponse();
            } else {
              console.log("AI 決定這次不說話，讓學生專心觀察。");
            }
          }, 1500); 
        }
      }
      lastImageData = new Uint8ClampedArray(currentImageData);
    }

    // 擷取並壓縮當下畫面 (用於傳送給後端)
    function captureHighResScreenshot() {
      const video = document.getElementById('screenVideo');
      const canvas = document.getElementById('captureCanvas');
      
      // 控制寬度在 800px 以內，避免 GAS 傳輸超時
      canvas.width = 800;
      canvas.height = (video.videoHeight / video.videoWidth) * 800;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      // 轉成 JPEG 並壓縮畫質到 60%
      let dataUrl = canvas.toDataURL('image/jpeg', 0.6);
      latestScreenshotBase64 = dataUrl.split(',')[1]; // 去除開頭的宣告字串
      return latestScreenshotBase64;
    }
